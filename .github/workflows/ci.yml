name: CI

on:
  push:
    branches: [main, beta]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g web-ext

      - name: Lint
        run: web-ext lint

      - name: Build .xpi
        run: web-ext build --filename matryoshka.xpi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: matryoshka-xpi
          path: web-ext-artifacts/matryoshka.xpi
